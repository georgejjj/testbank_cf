{% extends "base.html" %}

{% block title %}Question Browser - TestBank{% endblock %}
{% block nav_questions %}active{% endblock %}

{% block content %}
<h2 class="mb-4">Question Browser</h2>

<div class="row">
  <!-- Filters Sidebar -->
  <div class="col-lg-3">
    <div class="card shadow-sm mb-3">
      <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-funnel"></i> Filters</h5>
      </div>
      <div class="card-body">
        <form id="filterForm">
          <div class="mb-3">
            <label for="chapterSelect" class="form-label fw-semibold">Chapter</label>
            <select id="chapterSelect" name="chapter" class="form-select"
                    hx-get="{% url 'question_browser' %}"
                    hx-target="#question-list"
                    hx-include="#filterForm"
                    hx-trigger="change">
              <option value="">All Chapters</option>
              {% for chapter in chapters %}
              <option value="{{ chapter.pk }}"
                      {% if selected_chapter == chapter.pk|stringformat:"d" %}selected{% endif %}>
                Ch {{ chapter.number }}: {{ chapter.title }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label for="difficultySelect" class="form-label fw-semibold">Difficulty</label>
            <select id="difficultySelect" name="difficulty" class="form-select"
                    hx-get="{% url 'question_browser' %}"
                    hx-target="#question-list"
                    hx-include="#filterForm"
                    hx-trigger="change">
              <option value="">All Difficulties</option>
              <option value="1" {% if selected_difficulty == "1" %}selected{% endif %}>1 - Easy</option>
              <option value="2" {% if selected_difficulty == "2" %}selected{% endif %}>2 - Medium</option>
              <option value="3" {% if selected_difficulty == "3" %}selected{% endif %}>3 - Hard</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="skillSelect" class="form-label fw-semibold">Skill</label>
            <select id="skillSelect" name="skill" class="form-select"
                    hx-get="{% url 'question_browser' %}"
                    hx-target="#question-list"
                    hx-include="#filterForm"
                    hx-trigger="change">
              <option value="">All Skills</option>
              <option value="Conceptual" {% if selected_skill == "Conceptual" %}selected{% endif %}>Conceptual</option>
              <option value="Definition" {% if selected_skill == "Definition" %}selected{% endif %}>Definition</option>
              <option value="Analytical" {% if selected_skill == "Analytical" %}selected{% endif %}>Analytical</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="searchInput" class="form-label fw-semibold">Search</label>
            <input type="text" id="searchInput" name="search" class="form-control"
                   placeholder="Search questions..."
                   value="{{ search_query|default:'' }}"
                   hx-get="{% url 'question_browser' %}"
                   hx-target="#question-list"
                   hx-include="#filterForm"
                   hx-trigger="keyup changed delay:300ms">
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Question List -->
  <div class="col-lg-9">
    <div id="question-list">
      {% include "questions/_question_list.html" %}
    </div>
  </div>
</div>
{% endblock %}
