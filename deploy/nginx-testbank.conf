# Nginx config for testbank
# Copy to: /etc/nginx/sites-available/testbank
# Then: sudo ln -s /etc/nginx/sites-available/testbank /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT: Replace testbank.fin-tech.fun with your actual subdomain

server {
    listen 80;
    server_name testbank.fin-tech.fun;

    # Redirect HTTP to HTTPS (uncomment after certbot setup)
    # return 301 https://$host$request_uri;

    # Static files
    location /static/ {
        alias /home/georgejjj/testbank/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (question images)
    location /media/ {
        alias /home/georgejjj/testbank/media/;
        expires 7d;
    }

    # Proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        client_max_body_size 20M;  # For .docx uploads
    }
}
